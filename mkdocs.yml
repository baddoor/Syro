site_name: Syro
site_url: https://github.com/baddoor/Syro
site_author: Hounds
site_description: >-
    Documentation for the Syro plugin

repo_name: baddoor/Syro
repo_url: https://github.com/baddoor/Syro
edit_uri: ""
docs_dir: docs/docs
# use_directory_urls: false

theme:
    name: material
    logo: assets/favicon.ico
    favicon: assets/favicon.ico
    icon:
        repo: fontawesome/brands/github
    palette:
        - scheme: default
          toggle:
              icon: material/brightness-7
              name: Switch to dark mode
        - scheme: slate
          toggle:
              icon: material/brightness-4
              name: Switch to light mode
    features:
        - navigation.top
        - navigation.expand
        - toc.follow

nav:
    - Index: index.md

plugins:
    - search
    - i18n:
          docs_structure: folder
          languages:
              - locale: en
                name: English
                default: true
              - locale: zh
                name: 简体中文

markdown_extensions:
    - toc:
          permalink: true
    - pymdownx.highlight:
          anchor_linenums: true
    - pymdownx.inlinehilite
    - pymdownx.snippets
    - admonition
    - pymdownx.details
    - pymdownx.superfences
    - attr_list
    - footnotes
    - pymdownx.emoji:
          emoji_index: !!python/name:material.extensions.emoji.twemoji
          emoji_generator: !!python/name:material.extensions.emoji.to_svg
    - md_in_html

extra_css:
    - stylesheets/extra.css

remote_branch: gh-pages
remote_name: origin
